<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>弥生給与取り込みアプリ - 撮影アシスト</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1f6feb" />

<!-- iOS Safari「ホーム画面に追加」対応: manifest.json だけでは反映されないため個別指定する -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="弥生取込" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d1117; color: #f0f6fc;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    overscroll-behavior: none;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  #camera-view, #preview-view { position: relative; flex: 1; overflow: hidden; background: #000; }
  video, #preview-canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
  #capture-canvas { display: none; }

  .hidden { display: none !important; }

  #status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 16px; font-size: 14px; text-align: center;
    background: rgba(0,0,0,0.55); min-height: 1.4em;
  }
  #status-bar.ok { color: #7ee787; }
  #status-bar.warn { color: #f0d264; }
  #status-bar.error { color: #ff7b72; }

  #controls {
    padding: 18px 20px calc(18px + env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: center; gap: 28px;
    background: #161b22;
  }
  button {
    font-family: inherit; border: none; border-radius: 999px; cursor: pointer;
    color: #fff; font-size: 16px; font-weight: 600;
  }
  #shutter-button {
    width: 76px; height: 76px; border-radius: 50%;
    background: #fff; border: 5px solid #8b949e;
  }
  #shutter-button:active { background: #d0d7de; }

  .action-button {
    padding: 14px 22px; background: #238636;
  }
  .action-button.secondary { background: #30363d; }
  .action-button:disabled { opacity: 0.5; }

  #processing-indicator {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); font-size: 15px;
  }

  #batch-view {
    flex: 1; overflow-y: auto; padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  }
  #batch-view h2 { font-size: 16px; margin: 0 0 12px; }
  #batch-summary { font-size: 13px; color: #8b949e; margin-bottom: 12px; }
  #batch-list { list-style: none; margin: 0; padding: 0; }
  #batch-list li {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 10px 0; border-bottom: 1px solid #21262d; font-size: 14px;
  }
  #batch-list .file-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  #batch-list .file-status {
    flex-shrink: 0; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #batch-list .file-status.pending { color: #8b949e; }
  #batch-list .file-status.ok { color: #7ee787; }
  #batch-list .file-status.warn { color: #f0d264; }
  #batch-list .file-status.error { color: #ff7b72; }

  .icon-button {
    width: 52px; height: 52px; border-radius: 50%; background: #30363d;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
</style>
</head>
<body>
<div id="app">

  <div id="camera-view">
    <div id="status-bar"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="capture-canvas"></canvas>
  </div>

  <div id="preview-view" class="hidden">
    <canvas id="preview-canvas"></canvas>
    <div id="processing-indicator" class="hidden">補正処理中…</div>
  </div>

  <div id="batch-view" class="hidden">
    <h2>過去データのまとめ取り込み</h2>
    <div id="batch-summary"></div>
    <ul id="batch-list"></ul>
  </div>

  <div id="controls">
    <button id="batch-picker-button" class="icon-button" aria-label="過去の写真からまとめて取り込む" title="過去の写真からまとめて取り込む">📂</button>
    <button id="shutter-button" aria-label="撮影"></button>
    <button id="retake-button" class="action-button secondary hidden">撮り直す</button>
    <button id="send-button" class="action-button hidden">送信する</button>
    <button id="batch-done-button" class="action-button hidden">閉じる</button>
  </div>

  <input type="file" id="batch-file-input" accept="image/*" multiple style="display:none" />

</div>

<!-- opencv.js（約10MB）はapp.js側で非同期に読み込む（同期scriptタグにすると、
     読み込みが遅い回線でカメラ起動自体がブロックされてしまうため）。 -->
<script src="app.js"></script>
</body>
</html>
